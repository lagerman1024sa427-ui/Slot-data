<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>若宮スロット分析 v9.4</title>
<style>
:root {
  --bg:#ffffff; --card:#ffffff; --line:#e5e7eb; --text:#111827; --muted:#6b7280;
  --accent:#b8925b; --accent2:#8b6a3f; --soft:#f6f2eb; --green:#18a957; --red:#ef6b6b;
  --greenSoft:#d9f7e5; --redSoft:#fde1e1; --graySoft:#f3f4f6; --shadow:0 8px 24px rgba(17,24,39,.08);
}
* { box-sizing:border-box; }
html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; }
body { min-height:100vh; }
.wrap { max-width:980px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 10px) 12px calc(88px + env(safe-area-inset-bottom)); }
.header { position:sticky; top:0; z-index:30; background:rgba(255,255,255,.94); backdrop-filter:blur(10px); padding-bottom:10px; }
.titleRow { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.title { font-size:22px; font-weight:900; letter-spacing:.02em; }
.badge { display:inline-block; margin-left:8px; padding:3px 8px; border-radius:999px; background:#1f2937; color:#fff; font-size:11px; vertical-align:middle; }
.sub { margin-top:6px; color:var(--muted); font-size:12px; line-height:1.5; }
.banner { margin-top:10px; padding:10px 12px; border:1px solid var(--line); border-radius:14px; background:#fff; box-shadow:var(--shadow); font-size:12px; }
.banner.ok { border-color:#cae9d5; background:#f7fff9; }
.banner.warn { border-color:#f7d6d6; background:#fff8f8; }
.seg { display:flex; gap:6px; background:#fff; border:1px solid var(--line); border-radius:18px; padding:4px; box-shadow:var(--shadow); margin-top:12px; }
.seg button { flex:1; border:0; background:transparent; padding:12px 10px; border-radius:14px; color:var(--muted); font-weight:800; font-size:16px; }
.seg button.active { background:var(--accent); color:#fff; }
.nav { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.nav button { border:1px solid var(--line); background:#fff; color:var(--text); border-radius:14px; padding:10px 14px; font-weight:700; box-shadow:var(--shadow); }
.nav button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.card { background:var(--card); border:1px solid var(--line); border-radius:24px; padding:16px; box-shadow:var(--shadow); margin-top:14px; }
.card h3 { margin:0 0 12px; font-size:15px; }
.metricChips { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 12px; }
.metricChips button { border:0; background:#f0f2f5; color:#4b5563; border-radius:999px; padding:10px 14px; font-weight:800; }
.metricChips button.active { background:var(--accent); color:#fff; }
.weekdays, .calendarGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
.weekday { text-align:center; color:#6b7280; font-weight:800; padding:4px 0; }
.cell { min-height:104px; border-radius:16px; border:1px solid var(--line); padding:8px 8px 10px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; background:#fff; }
.cellValue { font-size:26px; font-weight:900; text-align:center; line-height:1.05; }
.matrixTable { width:100%; border-collapse:separate; border-spacing:4px; table-layout:fixed; }
.matrixTable th, .matrixTable td { padding:8px 6px; text-align:center; border-radius:10px; font-size:12px; }
textarea,input { width:100%; border:1px solid var(--line); border-radius:16px; background:#fff; padding:12px 14px; font-size:16px; color:var(--text); }
textarea { min-height:220px; }
.btn { border:1px solid var(--line); background:#fff; border-radius:14px; padding:10px 14px; font-weight:700; box-shadow:var(--shadow); cursor:pointer; }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.footerBar { position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.96); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:8px 12px calc(8px + env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:35; }
.footerBar button { flex:1; border:0; border-radius:18px; padding:14px 12px; font-size:22px; font-weight:900; }
.overlay { position:fixed; inset:0; background:rgba(17,24,39,.45); display:none; align-items:flex-start; justify-content:center; padding:calc(env(safe-area-inset-top) + 14px) 10px calc(20px + env(safe-area-inset-bottom)); z-index:50; }
.overlay.show { display:flex; }
.modal { width:min(960px,100%); max-height:92vh; overflow:auto; background:#fff; border-radius:28px; padding:18px; }
.hide { display:none!important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="titleRow">
      <div>
        <div class="title">若宮スロット分析 <span class="badge">v9.4</span></div>
        <div id="subline" class="sub"></div>
      </div>
    </div>
    <div id="syncBanner" class="banner">読込中...</div>
    <div class="seg" id="typeSeg">
      <button data-type="hana" class="active">ハナハナ</button>
      <button data-type="juggler">ジャグラー</button>
    </div>
    <div class="nav" id="mainNav">
      <button class="active" data-view="calendar">カレンダー</button>
      <button data-view="matrix">マトリクス</button>
      <button data-view="update">更新</button>
    </div>
  </div>
  <section id="view-calendar"><div class="calendarWrap"><div class="monthHead"><button class="iconBtn" id="prevMonth">◀</button><div class="monthTitle" id="monthTitle"></div><button class="iconBtn" id="nextMonth">▶</button></div><div class="metricChips" id="calendarMetricChips"></div><div class="weekdays"><div class="weekday">日</div><div class="weekday">月</div><div class="weekday">火</div><div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday">土</div></div><div class="calendarGrid" id="calendarGrid"></div></div></section>
  <section id="view-matrix" class="hide"><div class="card"><div class="metricChips" id="matrixModeChips"></div><div class="metricChips" id="matrixMetricChips"></div><div style="overflow:auto"><table class="matrixTable" id="matrixTable"></table></div></div></section>
  <section id="view-update" class="hide"><div class="card"><h3>更新</h3><input id="updateDate" type="date"><textarea id="updateText" placeholder="データ貼り付け"></textarea><div class="btnRow" style="margin-top:12px"><button class="btn primary" id="saveBtn">Cloudへ保存</button></div></div></section>
</div>
<div class="footerBar"><button class="main" id="footerToday">本日</button></div>
<div class="overlay" id="modalOverlay"><div class="modal"><div id="modalBody"></div><button class="btn" id="modalClose" style="width:100%; margin-top:12px">閉じる</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
