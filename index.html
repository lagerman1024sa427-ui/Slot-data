<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>若宮スロット分析 v9.3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#f3f4f6; --card:#ffffff; --line:#e5e7eb; --text:#111827; --muted:#6b7280;
  --accent:#b8925b; --accent2:#8b6a3f; --soft:#f6f2eb; --green:#18a957; --red:#ef6b6b;
  --greenSoft:#d9f7e5; --redSoft:#fde1e1; --graySoft:#f3f4f6; --shadow:0 8px 24px rgba(17,24,39,.08);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; }
.header { position:sticky; top:0; background:rgba(255,255,255,.8); backdrop-filter:blur(10px); z-index:100; padding:10px 0; border-bottom:1px solid var(--line); }
.tab-wrap { display:flex; gap:8px; overflow-x:auto; padding:0 12px; }
.tab { padding:8px 16px; border-radius:20px; background:var(--graySoft); cursor:pointer; font-size:14px; white-space:nowrap; }
.tab.active { background:var(--accent); color:white; }
.card { background:var(--card); border-radius:16px; border:1px solid var(--line); padding:20px; margin-bottom:16px; box-shadow:var(--shadow); }
textarea { width:100%; height:160px; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
button { width:100%; padding:14px; border-radius:12px; border:none; font-weight:bold; cursor:pointer; font-size:15px; }
.btn-primary { background:var(--accent); color:white; margin-bottom:8px; }
.btn-save { background:var(--accent2); color:white; }
table { width:100%; border-collapse:collapse; margin-top:16px; font-size:13px; }
th, td { padding:12px 8px; border-bottom:1px solid var(--line); text-align:center; }
.plus { color:var(--red); font-weight:bold; }
</style>
</head>
<body>
<div class="header">
  <div class="tab-wrap">
    <div class="tab" id="t-cal" onclick="showTab('cal')">カレンダー</div>
    <div class="tab" id="t-mat" onclick="showTab('mat')">マトリクス</div>
    <div class="tab active" id="t-upd" onclick="showTab('upd')">更新</div>
    <div class="tab" id="t-use" onclick="showTab('use')">使い方</div>
  </div>
</div>

<div class="wrap" style="padding:20px 12px 100px;">
  <div id="tab-upd" class="tab-content">
    <div class="card">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button onclick="setType('ハナハナ')" id="b-hana" style="flex:1; background:#b8925b; color:white;">ハナハナ</button>
        <button onclick="setType('ジャグラー')" id="b-jug" style="flex:1; background:var(--graySoft); color:var(--text);">ジャグラー</button>
      </div>
      <input type="date" id="inputDate" style="width:100%; padding:12px; border:1px solid var(--line); border-radius:8px; margin-bottom:12px;">
      <textarea id="inputText" placeholder="データを貼り付け"></textarea>
      <button class="btn-primary" onclick="doPreview()">プレビュー</button>
      <button class="btn-save" onclick="doSave()">Cloudへ保存</button>
      <div id="resArea"></div>
    </div>
  </div>
  
  <div id="tab-cal" class="tab-content" style="display:none;"><div class="card" id="calView"></div></div>
  <div id="tab-mat" class="tab-content" style="display:none;"><div class="card" id="matView"></div></div>
</div>

<script>
const S_URL = 'https://lagerman1024sa427-ui.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // あなたのキーを維持
const db = supabase.createClient(S_URL, S_KEY);

let currentType = 'ハナハナ';
let previewData = [];

function showTab(t){
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
  document.querySelectorAll('.tab').forEach(tab=>tab.classList.remove('active'));
  document.getElementById('tab-'+t).style.display='block';
  document.getElementById('t-'+t).classList.add('active');
}

function setType(t){
  currentType = t;
  document.getElementById('b-hana').style.background = (t==='ハナハナ'?'#b8925b':'var(--graySoft)');
  document.getElementById('b-jug').style.background = (t==='ジャグラー'?'#b8925b':'var(--graySoft)');
}

function doPreview(){
  const val = document.getElementById('inputText').value.trim();
  const rows = val.split('\n');
  let h = '<table><tr><th>台番</th><th>BB</th><th>RB</th><th>G</th><th>差枚</th></tr>';
  previewData = [];
  rows.forEach(r=>{
    const p = r.split(/\s+/);
    if(p.length>=4){
      const diff = (parseInt(p[1])*240 + parseInt(p[2])*90) - (parseInt(p[3])*3);
      const s = (diff>0?'+':'')+diff.toLocaleString();
      previewData.push({id:p[0], bb:p[1], rb:p[2], g:p[3], samai:s});
      h += `<tr><td>${p[0]}</td><td>${p[1]}</td><td>${p[2]}</td><td>${p[3]}</td><td class="${diff>0?'plus':''}">${s}</td></tr>`;
    }
  });
  document.getElementById('resArea').innerHTML = h+'</table>';
}

async function doSave(){
  const d = document.getElementById('inputDate').value;
  if(!d || !previewData.length) return alert("日付とプレビューを確認してください");
  
  const upload = previewData.map(x=>({
    date: d,
    type: currentType,
    machine_id: x.id,
    bb: parseInt(x.bb),
    rb: parseInt(x.rb),
    g: parseInt(x.g),
    // ここでエラーの原因「+」と「,」を確実に消して数字にします
    samai: parseInt(x.samai.toString().replace(/[+,]/g, '')) || 0
  }));

  const { error } = await db.from('slot_daily_records').upsert(upload, { onConflict: 'date,type,machine_id' });
  if(error) alert("保存失敗: " + error.message);
  else alert("保存成功！");
}
</script>
</body>
</html>
